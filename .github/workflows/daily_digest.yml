name: Daily Paper Digest
on:
  schedule:
    # Run at 00:00 UTC = 08:00 Beijing time
    - cron: '0 0 * * *'
  workflow_dispatch:  # Allow manual trigger
permissions:
  contents: write  # Needed to commit cache updates
jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6  # ✅ 更新到 v6
      - name: Set up Python
        uses: actions/setup-python@v6  # ✅ 更新到 v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run paper digest
        env:
          # AI Provider (set the one matching your config)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Email
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER || 'smtp.gmail.com' }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || '587' }}
          # GitHub info for vote links
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py --config config.yaml
      - name: Commit cache updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Paper Digest Bot"
          git add data/paper_cache.json data/keywords.json
          git diff --staged --quiet || git commit -m "chore: update paper cache and keyword weights [skip ci]"
          git push
