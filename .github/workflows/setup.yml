name: "⚙️ Setup: Generate Configuration"

on:
  workflow_dispatch:
    inputs:
      ai_provider:
        description: 'AI Provider'
        required: true
        type: choice
        options:
          - gemini
          - openai
          - claude
        default: gemini
      language:
        description: 'Email language'
        required: true
        type: choice
        options:
          - zh
          - en
        default: zh
      max_papers:
        description: 'Max papers per email'
        required: false
        type: string
        default: '20'
      schedule_hour_utc:
        description: 'Send time (UTC hour, 0=08:00 Beijing)'
        required: true
        type: choice
        options:
          - '0'
          - '6'
          - '13'
          - '22'
        default: '0'
      arxiv_categories:
        description: 'arXiv categories (comma-separated)'
        required: false
        type: string
        default: 'physics.atom-ph,quant-ph'
      aps_journals:
        description: 'APS journals (comma-separated)'
        required: false
        type: string
        default: 'prl,pra'
      enable_nature:
        description: 'Enable Nature/Nature Physics?'
        required: false
        type: boolean
        default: false
      enable_science:
        description: 'Enable Science/Science Advances?'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate_config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6  # ✅ 更新

      - name: Generate config.yaml
        env:
          INPUT_PROVIDER: ${{ inputs.ai_provider }}
          INPUT_LANG: ${{ inputs.language }}
          INPUT_MAX: ${{ inputs.max_papers }}
          INPUT_ARXIV: ${{ inputs.arxiv_categories }}
          INPUT_APS: ${{ inputs.aps_journals }}
          INPUT_NATURE: ${{ inputs.enable_nature }}
          INPUT_SCIENCE: ${{ inputs.enable_science }}
        run: |
          python3 << 'PYEOF'
          import os
          from datetime import datetime, timezone

          provider = os.environ.get("INPUT_PROVIDER", "gemini")
          lang = os.environ.get("INPUT_LANG", "zh")
          max_papers = os.environ.get("INPUT_MAX", "20")
          arxiv_cats = [c.strip() for c in os.environ.get("INPUT_ARXIV", "").split(",") if c.strip()]
          aps_journals = [j.strip() for j in os.environ.get("INPUT_APS", "").split(",") if j.strip()]
          enable_nature = os.environ.get("INPUT_NATURE", "false").lower() == "true"
          enable_science = os.environ.get("INPUT_SCIENCE", "false").lower() == "true"

          today = datetime.now(timezone.utc).strftime("%Y-%m-%d")

          lines = []
          lines.append(f"# Paper Digest Bot Configuration")
          lines.append(f"# Auto-generated on {today}")
          lines.append(f"")
          lines.append(f"ai_provider: {provider}")
          lines.append(f"")
          lines.append(f"email:")
          lines.append(f"  language: {lang}")
          lines.append(f"  max_papers: {max_papers}")
          lines.append(f"")
          lines.append(f"sources:")
          lines.append(f"  arxiv:")
          lines.append(f"    enabled: true")
          lines.append(f"    categories:")
          for c in arxiv_cats:
              lines.append(f"      - {c}")
          lines.append(f"  aps:")
          lines.append(f"    enabled: true")
          lines.append(f"    journals:")
          for j in aps_journals:
              lines.append(f"      - {j}")
          lines.append(f"  nature:")
          lines.append(f"    enabled: {str(enable_nature).lower()}")
          lines.append(f"    journals:")
          lines.append(f"      - nature")
          lines.append(f"      - nphys")
          lines.append(f"  science:")
          lines.append(f"    enabled: {str(enable_science).lower()}")
          lines.append(f"    journals:")
          lines.append(f"      - science")
          lines.append(f"      - sciadv")
          lines.append(f"")
          lines.append(f"weights:")
          lines.append(f"  vote_values:")
          lines.append(f"    not_interested: -2")
          lines.append(f"    neutral: 0")
          lines.append(f"    very_relevant: 3")
          lines.append(f"  daily_decay: 0.02")
          lines.append(f"  min_threshold: 0.1")
          lines.append(f"  initial_weight: 1.0")

          with open("config.yaml", "w") as f:
              f.write("\n".join(lines) + "\n")

          print("Generated config.yaml:")
          print("\n".join(lines))
          PYEOF

      - name: Update cron schedule
        env:
          INPUT_HOUR: ${{ inputs.schedule_hour_utc }}
        run: |
          HOUR="${INPUT_HOUR}"
          sed -i "s/cron: '0 [0-9]* \* \* \*'/cron: '0 ${HOUR} * * *'/" .github/workflows/daily_digest.yml
          echo "Updated schedule to UTC ${HOUR}:00"

      - name: Commit configuration
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Paper Digest Bot"
          git add -f config.yaml .github/workflows/daily_digest.yml
          git diff --staged --quiet || git commit -m "setup: generate config.yaml [skip ci]"
          git push

      - name: Print next steps
        run: |
          echo ""
          echo "============================================="
          echo "  ✅ config.yaml generated successfully!"
          echo "============================================="
          echo ""
          echo "  Next steps:"
          echo "  1. Make sure GitHub Secrets are set"
          echo "  2. Run 'Bootstrap Keywords from DOIs' workflow"
          echo "  3. Run 'Daily Paper Digest' to test"
          echo "============================================="
