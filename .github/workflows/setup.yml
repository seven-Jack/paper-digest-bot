name: "⚙️ Setup: Generate Configuration"

on:
  workflow_dispatch:
    inputs:
      ai_provider:
        description: 'AI Provider'
        required: true
        type: choice
        options:
          - gemini
          - openai
          - claude
        default: gemini
      language:
        description: 'Email language'
        required: true
        type: choice
        options:
          - zh
          - en
        default: zh
      max_papers:
        description: 'Max papers per email'
        required: false
        type: number
        default: 20
      schedule_hour_utc:
        description: 'Send time (UTC hour, 0=08:00 Beijing)'
        required: true
        type: choice
        options:
          - '0'
          - '6'
          - '13'
          - '22'
        default: '0'
      arxiv_categories:
        description: 'arXiv categories (comma-separated, e.g. physics.atom-ph,quant-ph)'
        required: false
        type: string
        default: 'physics.atom-ph,quant-ph'
      aps_journals:
        description: 'APS journals (comma-separated, e.g. prl,pra,prx)'
        required: false
        type: string
        default: 'prl,pra'
      enable_nature:
        description: 'Enable Nature/Nature Physics?'
        required: false
        type: boolean
        default: false
      enable_science:
        description: 'Enable Science/Science Advances?'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate_config:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate config.yaml
        run: |
          # Parse comma-separated inputs into YAML list items
          ARXIV_CATS=""
          IFS=',' read -ra CATS <<< "${{ inputs.arxiv_categories }}"
          for cat in "${CATS[@]}"; do
            cat=$(echo "$cat" | xargs)  # trim whitespace
            [ -n "$cat" ] && ARXIV_CATS="${ARXIV_CATS}      - ${cat}\n"
          done

          APS_JOURNALS=""
          IFS=',' read -ra JOURNALS <<< "${{ inputs.aps_journals }}"
          for j in "${JOURNALS[@]}"; do
            j=$(echo "$j" | xargs)
            [ -n "$j" ] && APS_JOURNALS="${APS_JOURNALS}      - ${j}\n"
          done

          cat > config.yaml << 'HEREDOC'
          # Paper Digest Bot Configuration
          # Auto-generated by Setup workflow

          HEREDOC

          # Write config with proper formatting
          printf "# Paper Digest Bot Configuration\n" > config.yaml
          printf "# Auto-generated on $(date -u +%%Y-%%m-%%d)\n\n" >> config.yaml
          printf "ai_provider: ${{ inputs.ai_provider }}\n\n" >> config.yaml
          printf "email:\n" >> config.yaml
          printf "  language: ${{ inputs.language }}\n" >> config.yaml
          printf "  max_papers: ${{ inputs.max_papers }}\n\n" >> config.yaml
          printf "sources:\n" >> config.yaml
          printf "  arxiv:\n" >> config.yaml
          printf "    enabled: true\n" >> config.yaml
          printf "    categories:\n" >> config.yaml
          printf "$ARXIV_CATS" >> config.yaml
          printf "  aps:\n" >> config.yaml
          printf "    enabled: true\n" >> config.yaml
          printf "    journals:\n" >> config.yaml
          printf "$APS_JOURNALS" >> config.yaml
          printf "  nature:\n" >> config.yaml
          printf "    enabled: ${{ inputs.enable_nature }}\n" >> config.yaml
          printf "    journals:\n      - nature\n      - nphys\n" >> config.yaml
          printf "  science:\n" >> config.yaml
          printf "    enabled: ${{ inputs.enable_science }}\n" >> config.yaml
          printf "    journals:\n      - science\n      - sciadv\n\n" >> config.yaml
          printf "weights:\n" >> config.yaml
          printf "  vote_values:\n" >> config.yaml
          printf "    not_interested: -2\n" >> config.yaml
          printf "    neutral: 0\n" >> config.yaml
          printf "    very_relevant: 3\n" >> config.yaml
          printf "  daily_decay: 0.02\n" >> config.yaml
          printf "  min_threshold: 0.1\n" >> config.yaml
          printf "  initial_weight: 1.0\n" >> config.yaml

          echo "Generated config.yaml:"
          cat config.yaml

      - name: Update cron schedule
        run: |
          HOUR="${{ inputs.schedule_hour_utc }}"
          sed -i "s/cron: '0 0 \* \* \*'/cron: '0 ${HOUR} * * *'/" .github/workflows/daily_digest.yml
          echo "Updated schedule to UTC ${HOUR}:00"

      - name: Commit configuration
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Paper Digest Bot"
          git add config.yaml .github/workflows/daily_digest.yml
          git diff --staged --quiet || git commit -m "setup: generate config.yaml [skip ci]"
          git push

      - name: Print next steps
        run: |
          echo ""
          echo "============================================="
          echo "  ✅ config.yaml generated successfully!"
          echo "============================================="
          echo ""
          echo "  Next steps:"
          echo "  1. Set GitHub Secrets (Settings → Secrets → Actions):"
          echo "     - ${{ inputs.ai_provider == 'gemini' && 'GEMINI_API_KEY' || inputs.ai_provider == 'openai' && 'OPENAI_API_KEY' || 'ANTHROPIC_API_KEY' }}"
          echo "     - EMAIL_ADDRESS"
          echo "     - EMAIL_PASSWORD"
          echo ""
          echo "  2. Run 'Bootstrap Keywords from DOIs' workflow"
          echo "     with your reference paper DOIs"
          echo ""
          echo "  3. Run 'Daily Paper Digest' to test"
          echo "============================================="
